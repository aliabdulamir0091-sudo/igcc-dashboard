<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>IGCC Financial Dashboard</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,Helvetica,sans-serif;background:#f4f7fb;color:#10233f;">
        <div style="width:min(520px,100%);border:1px solid #cbd5e1;border-radius:10px;padding:24px;background:#fff;box-shadow:0 18px 45px rgba(15,23,42,.10);">
          <div style="color:#0f766e;font-size:12px;font-weight:900;text-transform:uppercase;">IGCC Dashboard</div>
          <h1 style="margin:8px 0 0;font-size:24px;">Loading financial dashboard</h1>
          <p style="margin:10px 0 0;color:#475569;line-height:1.5;">If this message stays on screen, press Ctrl + F5 or clear site data for this page and reload.</p>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener("error", function (event) {
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          '<div style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,Helvetica,sans-serif;background:#f4f7fb;color:#10233f;">' +
          '<div style="width:min(620px,100%);border:1px solid #fecaca;border-radius:10px;padding:24px;background:#fff;box-shadow:0 18px 45px rgba(15,23,42,.10);">' +
          '<div style="color:#b91c1c;font-size:12px;font-weight:900;text-transform:uppercase;">Financial dashboard load error</div>' +
          '<h1 style="margin:8px 0 0;font-size:24px;">The app bundle did not load correctly</h1>' +
          '<p style="margin:10px 0 0;color:#475569;line-height:1.5;">Please clear site data for this URL, then reload. Error: ' +
          String(event.message || "Unknown error").replace(/[<>&]/g, "") +
          "</p></div></div>";
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
